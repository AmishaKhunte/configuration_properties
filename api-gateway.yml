server:
  port: 3333

spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: false

          routes:
            - id: admin-api
              uri: lb://ADMIN-API
              predicates:
                - Path=/api/admin/**

            - id: user-api
              uri: lb://USER-API
              predicates:
                - Path=/api/user/**

            - id: order-api
              uri: lb://ORDER-API
              predicates:
                - Path=/api/order/**

            - id: notifications-api
              uri: lb://NOTIFICATIONS-API
              predicates:
                - Path=/api/notifications/**

            - id: products-listing-api
              uri: lb://PRODUCTS-LISTING-API
              predicates:
                - Path=/api/products/**

            - id: products-api
              uri: lb://PRODUCTS-API
              predicates:
                - Path=/api/products-api/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
