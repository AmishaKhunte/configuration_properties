server:
  port: 8085

spring:
  application:
    name: admin-api

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/mymart_admin_db
    username: root
    password: rootuser

  boot:
    admin:
      client:
        url: http://localhost:1111

  devtools:
    restart:
      log-condition-evaluation-delta: false

eureka:
  instance:
    prefer-ip-address: true

  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always

  info:
    env:
      enabled: true
